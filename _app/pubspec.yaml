name: _app
description: A new Flutter project.

publish_to: "none"

version: 1.1.0+2

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.1
  video_player: ^2.6.0
  chewie: ^1.5.0
  url_launcher: ^6.2.6
  package_info_plus: ^8.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.0.17
  image_picker: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.1.7
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/project1/fitnesslevel/fitnity_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/project1/fitnesslevel/fitnity_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/project1/
    - assets/project1/homesection/
    - assets/project1/workoutlevels/
    - assets/project1/onboarding/
    - assets/project1/fitnesslevel/
